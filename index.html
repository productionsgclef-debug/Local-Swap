<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <title>Local-Swap Portal</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #f0f7f4; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .app-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; max-width: 300px; }
        .icon { font-size: 50px; margin-bottom: 10px; }
        .btn { background: #4CAF50; color: white; border: none; padding: 12px 24px; border-radius: 25px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="app-card">
        <div class="icon">🔄</div>
        <h1>Local-Swap</h1>
        <p>Find and manage secure local trades in your area.</p>
        <button class="btn" onclick="alert('Searching for local swaps...')">Find Nearby</button>
    </div>
</body>
</html>
